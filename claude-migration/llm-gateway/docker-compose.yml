services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    restart: always
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file: .env
    expose:
      - "4000"

  router:
    build: ./router
    restart: always
    env_file: .env
    environment:
      - LITELLM_BASE=http://litellm:4000
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      - litellm
